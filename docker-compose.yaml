services:
  mlflow:
    build: .
    command:
      - uv
      - tool
      - run
      - --python
      - "3.12"
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5018"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
      - --allowed-hosts
      - localhost,localhost:5018,127.0.0.1,127.0.0.1:5018,mlflow,mlflow:5018
      - --cors-allowed-origins
      - http://localhost:5018,http://127.0.0.1:5018
    ports:
      - "5018:5018"
    volumes:
      - mlflow-data:/mlflow

  airflow:
    build: .
    command: ["bash", "run-airflow-standalone.sh"]
    depends_on:
      - mlflow
      - minio
    environment:
      AIRFLOW_HOME: /airflow
      AIRFLOW__CORE__DAGS_FOLDER: /mlops-assignment/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5018
      MLFLOW_EXPERIMENT_NAME: swe-bench-agent-evals
      MSWEA_COST_TRACKING: ignore_errors
      DOCKER_HOST: unix:///var/run/docker.sock
      EXECUTION_IMAGE: ${EXECUTION_IMAGE:-my_fork-airflow:latest}
      HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT:-/workspaces/_almaz/na_ai_engineer/mlops/hw3/my_fork}
      HOST_DOCKER_SOCKET: ${HOST_DOCKER_SOCKET:-/var/run/docker_socket/docker.sock}
      S3_ARTIFACT_URI: s3://mlops-runs/swe-bench-runs/
      AWS_ENDPOINT_URL_S3: http://minio:9000
      MINIO_BROWSER_URI: http://localhost:9001
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - .:/mlops-assignment
      - airflow-home:/airflow
      - /var/run/docker_socket/docker.sock:/var/run/docker.sock

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  airflow-home:
  mlflow-data:
  minio-data:
