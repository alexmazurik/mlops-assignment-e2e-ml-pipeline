services:
  mlflow:
    build: .
    command:
      - uv
      - tool
      - run
      - --python
      - "3.12"
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5018"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
      - --allowed-hosts
      - localhost,localhost:5018,127.0.0.1,127.0.0.1:5018,mlflow,mlflow:5018
      - --cors-allowed-origins
      - http://localhost:5018,http://127.0.0.1:5018
    ports:
      - "5018:5018"
    volumes:
      - mlflow-data:/mlflow

  airflow:
    build: .
    command: ["bash", "run-airflow-standalone.sh"]
    depends_on:
      - mlflow
    environment:
      AIRFLOW_HOME: /airflow
      AIRFLOW__CORE__DAGS_FOLDER: /mlops-assignment/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLFLOW_TRACKING_URI: http://mlflow:5018
      MLFLOW_EXPERIMENT_NAME: swe-bench-agent-evals
      MSWEA_COST_TRACKING: ignore_errors
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - .:/mlops-assignment
      - airflow-home:/airflow
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  airflow-home:
  mlflow-data:
